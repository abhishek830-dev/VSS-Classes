<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a Form</title>
    <H2>Please fill form first</H2>
<form action="/action_page.php" target="_blank" accept="action">
    
    <label>Name:-</label>
    <input type="text" placeholder="Enter Name"><br><br>
    <label>Email:-</label>
    <input type="Email" placeholder="Enter Email"><br><br>
    <label>Age:-</label>
    <input type="Age" placeholder="Enter Age"><br><br>
    <label>Password:-</label>
    <input type="Password" placeholder="Enter Password"><br><br>
    <label>Date of Birth:-</label>
    <input type="Date"><br><br>
    <label>Gender:-</label>
    <input type="radio" name="gender">Male
    <input type="radio" name="gender">Female
    <input type="radio" name="gender">Other <br><br>
    <label>Skills:-</label>
    <input type="checkbox">Html

    <input type="checkbox">Js <br><br>
    <label>Select Location:-</label>

        <option>Select</option>
        <option>Indore</option>

        <option>Banglore</option>

    <label>Tell me about yourself:-</label><br><br>
    <textarea rows="1" cols="40"></textarea><br><br>

      <option value="Chrome">

      <option value="Firefox">
    </datalist><br><br>

        <input type="text"><br><br>
        <label>Password</label>
        <input type="Password">
    </fieldset><br>

    </form><br><br>
