<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>

    <style>
      body {
        background-image: url("the_netflix_login_background__canada__2024___by_logofeveryt_dh0w8qv-fullview.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        margin: 0;
        padding: 0;
      }

      form input,
      form button {
        width: 100%;
        height: 48px;

        font-size: 16px;
        box-sizing: border-box;
      }

      .button {
        width: 100%;
        height: 48px;

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 16px;
      }

      input[type="submit"],
      button[type="submit"] {
        background-color: red;
        color: white;

        padding: 8px 15px;
        cursor: pointer;
        width: 100%;
        height: 48px;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      fieldset {
        width: 350px;
        padding: 30px;
        background-color: rgb(57, 43, 43);
      }

      .secondary-button {
        background-color: transparent !important;
        color: rgb(21, 17, 17) !important;
        border: 1px solid rgb(216, 198, 198) !important;
      }

      header img {
        width: 150px;
        height: auto;
      }

      .footer {
        background-color: ghostwhite;
            /* display: block;
    unicode-bidi: isolate; */
      }
    </style>

    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
  </head>

  <body>
    <header>
      <img src="download (3).png" alt="Netflix Logo" />
    </header>

    <main>
      <center>
        <fieldset>
          <section>
            <h2>Sign In</h2>

            <form>
              <input type="email" placeholder="Email or phone number" />
              <br /><br />
              <input type="password" placeholder="Password" /> <br /><br />

              <button type="submit" class="button">Sign In</button><br />
              <p>OR</p>
              <button type="submit" class="button secondary-button">
                Use a sign-in code</button
              ><br><br />

              <div>
                <label>
                  <input type="checkbox" />
                  Remember me
                </label>

                <a href="#">Need help</a>
              </div>
            </form>

            <div>
              <p>New to Netflix? <a href="#">Sign up now</a></p>
              <p>
                This page is protected by Google reCAPTCHA to ensure you're not
                a bot.
              </p>
              <a href="#">Learn more</a>
            </div>
          </section>
        </fieldset>
      </center>
    </main>

    <footer class="footer">
      <p>Questions? Call 000-800-919-1743 (Toll-Free)</p>
      <ul>
        <li><a href="#">FAQ</a></li>
        <li><a href="#">Help Centre</a></li>
        <li><a href="#">Terms of use</a></li>
        <li><a href="#">Privacy</a></li>
        <li><a href="#">Cookie References</a></li>
        <li><a href="#">Corporate Information</a></li>
      </ul>

      <select>
        <option>English</option>
        <option>Hindi</option>
      </select>
    </footer>

    <script src="" async defer></script>
  </body>
</html>
