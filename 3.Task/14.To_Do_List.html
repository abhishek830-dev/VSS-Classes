<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
  </head>
  <style>
    body {
      display: flex;
      background-color: rgb(171, 111, 255);
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background-color: white;
      justify-content: flex-start;
      align-items: center;
      width: 400px;+
      margin: 10px;
      max-height: 80vh;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* overflow-y: auto; */
      border: 1px solid grey;
    }
    #list {
      overflow-y: auto;
      max-height: 200px;
    }
    input,
    button {
      width: 300px;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
      border: 1px solid grey;
      border-radius: 5px;
    }
    .input-box {
      display: flex;
      gap: 10px;
    }
    .input-box input {
      flex: 1;
    }
    .input-box button {
      width: 50px;
      background-color: rgb(171, 111, 255);
      color: white;
    }
    h1,
    p {
      width: 100%;
      background-color: rgb(118, 44, 221);
      color: white;
      padding: 8px;
      
      border-radius: 5px;
      box-sizing: border-box;
      text-align: center;
    }
    .header {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-bottom: 15px;
    }

    .header h1,
    .header p {
        margin: 0;
        

    }
  </style>
  <body>
    <div class="container">
        <div class="header">
            <h1>My tasks</h1>
            <p>stay organized and productive</p>
            <p>0 tasks</p>
        </div>
      <div class="input-box">
        <input type="text" id="taskInput" placeholder="Add a new task" />
        <button id="addBtn">+</button>
      </div>

      <ul id="list"></ul>
    </div>
  </body>
  <script>
    let input = document.getElementById("taskInput");
    let button = document.getElementById("addBtn");
    let ul = document.getElementById("list");

    button.addEventListener("click", function () {
      let task = input.value;
      if (task === "") return;

      let li = document.createElement("li"); //
      li.textContent = task;

      // delete button
      let del = document.createElement("button");
      del.textContent = "X";

      del.addEventListener("click", function () {
        li.remove();
      });

      // mark complete
      li.addEventListener("click", function () {
        li.style.textDecoration = "line-through";
      });

      li.appendChild(del);
      ul.appendChild(li);

      input.value = "";
    });
  </script>
</html>
