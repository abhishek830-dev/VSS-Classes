<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WhatsApp Video Call UI</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(#0b141a, #1f2c34);
        overflow: hidden;
      }

      /* Main call screen */
      .call-screen {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Draggable PiP video */
      .pip-video {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 160px;
        height: 220px;
        background: #000;
        border-radius: 14px;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.7);
        cursor: grab;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        user-select: none;
      }

      .pip-video:active {
        cursor: grabbing;
      }

      .label {
        margin-bottom: 10px;
        padding: 4px 10px;
        font-size: 12px;
        color: #fff;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <div class="call-screen">
      <div id="pip" class="pip-video">
        <div class="label">You</div>
      </div>
    </div>

    <script>
      const pip = document.getElementById("pip");

      let isDragging = false;
      let startX, startY;

      pip.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX - pip.offsetLeft;
        startY = e.clientY - pip.offsetTop;
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        pip.style.left = `${e.clientX - startX}px`;
        pip.style.top = `${e.clientY - startY}px`;
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
      });

      /* Touch support (mobile) */
      pip.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        isDragging = true;
        startX = touch.clientX - pip.offsetLeft;
        startY = touch.clientY - pip.offsetTop;
      });

      document.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        pip.style.left = `${touch.clientX - startX}px`;
        pip.style.top = `${touch.clientY - startY}px`;
      });

      document.addEventListener("touchend", () => {
        isDragging = false;
      });
    </script>
  </body>
</html>
