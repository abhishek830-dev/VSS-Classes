<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factorial Calculator</title>
  </head>
  <style>
    body {
        display: flex;
        background-color: rgb(45, 52, 186);
        justify-content: center;
        align-items: center;
        height: 100vh;

    }
    .container {
        background-color: white;
        justify-content: center;
        align-items: center;
        width: 400px;
        margin: 10px;
        height: 50vh;
        border-radius: 10px;    
        display: flex;
        flex-direction: column;
        gap: 10px;    
    }

    input, button {
        width: 300px;
        padding: 10px;
        margin-top: 10px;
        box-sizing: border-box;
        border: 1px solid grey;
        border-radius: 5px;
    }

    button {
        background-color: blue;
        color: white;
        border-radius: 20px;
        border: 1px solid grey;
    }

    h1, #Result {
        font-weight: bold;
        font-family: Arial, sans-serif;
    }
    

  </style>
  <body>
        <div class="container">
          <h1>Factorial Calculator</h1>
          <input type="text" id="NumberInput" placeholder="Enter the number" />
          <button id="btn">Validate & Calculate</button>
          <p id="Result"></p>
        </div>
  </body>
  <script>
    let input = document.getElementById("NumberInput");
    let button = document.getElementById("btn");
    let result = document.getElementById("Result");

    button.addEventListener("click", function () {
      let num = parseInt(input.value);
      let original = num;
      if (isNaN(num) || num < 0) {
        result.textContent = "Enter a Valid positive Number";
        return;
      }
      let temp = 1;
      while (num > 1) {
        temp = temp * num;
        num--;
      }
      result.textContent = `Factorial of ${original} is ${temp}`;
    });
  </script>
</html>
