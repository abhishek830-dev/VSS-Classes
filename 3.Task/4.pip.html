<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Iframe inside PiP</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        background: #0b141a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
      }

      button {
        background: #25d366;
        border: none;
        padding: 14px 24px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <button id="openPip">Open Site in PiP</button>

    <script>
      const btn = document.getElementById("openPip");

      btn.addEventListener("click", async () => {
        if (!("documentPictureInPicture" in window)) {
          alert("Document Picture-in-Picture not supported.");
          return;
        }

        const pipWindow = await documentPictureInPicture.requestWindow({
          width: 360,
          height: 600,
        });

        pipWindow.document.body.style.margin = "0";
        pipWindow.document.body.innerHTML = `
      <style>
        body {
          margin: 0;
          background: #000;
          height: 100vh;
        }

        iframe {
          width: 100%;
          height: 100%;
          border: none;
        }
      </style>

      <iframe
        src="https://vidhyaskillschool.com"
        allow="camera; microphone; fullscreen"
      ></iframe>
    `;
      });
    </script>
  </body>
</html>
