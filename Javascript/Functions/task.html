     add(1,2,3) -> 6
     add(1,2,3,4) => 10
-->

<script>
    function add(...num) { // rest Operator
        console.log(num);
        let sum = 0;

        for (let i=0; i<num.length; i++) {
            sum += num[i];
        }
        return sum;
    }
    console.log(add(1,2));
    console.log(add(1,2,3));
    console.log(add(1,2,3,4));
    console.log();
</script>
