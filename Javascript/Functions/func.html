<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Nums | Normal Func</title>
  </head>
  <body></body>
</html>
<script>
  // Normal function
  function addNum(num1, num2) {
    const result = num1 + num2;
    return result;
  }

  const sum = addNum(10, 20);
  const sum2 = addNum(10);
  const sum3 = addNum("Rakshit");
  const sum4 = addNum("Vicky", " Gupta");

  console.log("Sum is: ", sum);
  console.log("Sum2 is: ", sum2);
  console.log("Sum3 is: ", sum3);
  console.log("Sum4 is: ", sum4);
  console.log("My name is : " + { name: "Vicky" });
  console.log("My name is : ", { name: "Vicky" });
</script>
