<script>
    function addNum(num1, num2) {
        const sum = num1 + num2;
        return sum;
    }

    // Via Arrow function
    const addNum2 = (num1, num2) => {
        const sum = num1 + num2;
        return sum;
    }
    console.log("addNum2: call: ", addNum2(2, 2));

    // Via Arrow function
    const addNum21 = (num1, num2) => {
        return num1 + num2;
    }
    console.log("addNum21: call: ", addNum21(7, 7));

    // Via arrow function - shorter
    const addNum3 = (num1, num2) => num1 + num2;

    const addNum4 = (ab1, ab2) => ab1 + ab2;

    console.log("addNum2: call: ", addNum2(20, 20));
    console.log("addNum4: call: ", addNum4(20, 20));

    // Via function loop
    function runLoop(n) {
    for (let i = 1; i <= n; i++) {
        console.log(i);
    }
}
let num1 = prompt("Enter 1st number")
let num2 = prompt("Enter 2nd number")
console.log(num1 , num2);
</script>
