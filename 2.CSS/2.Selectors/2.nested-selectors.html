<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nested Selectors</title>
    <style>
      #firstId p {
        color: tomato;
      }
      #firstId > p {
        color: rgb(243, 255, 71);
      }
      p {
        color: violet;
      }
    </style>
  </head>
  <body>
    <p>Hello from Body container 18</p>
    <div id="firstId">
      <p>Hello from firstId container 20</p>
      <div id="secondId">
        <div id="thirId">
          <div class="para-class-container">
            <p>Hello From para-class-container 24</p>
            <section>
              <section>
                <section>
                  <section>
                    <section>
                      <section>
                        <p>Inside Inner section</p>
                      </section>
                    </section>
                  </section>
                </section>
              </section>
            </section>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
