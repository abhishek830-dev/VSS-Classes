<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Align Items Stretch</title>
    <style>
      body {
        margin: 0;
      }
      .box {
        display: flex;
        background-color: lightgreen;
        padding: 12px;
        gap: 12px;
        height: 300px;
      }

      .item {
        background-color: chocolate;
      }

      .ai-stretch {
        margin-top: 12px;
        align-items: stretch;
      }
    </style>
  </head>
  <body>
    <div class="box ai-stretch">
      <div class="item item-one">Item 1</div>
      <div class="item item-two">Item 2</div>
      <div class="item item-three">Item 3</div>
    </div>
  </body>
</html>
