<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Netflix</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: black;
    "
  >
    <!-- Background -->
    <div
      style="
        width: 100%;
        height: 100vh;
        background: linear-gradient(
            to top,
            rgba(0, 0, 0, 0.8),
            rgba(0, 0, 0, 0.8)
          ),
          #111;
        background-size: cover;
        display: flex;
        flex-direction: column;
      "
    >
      <!-- Header -->
      <div style="padding: 25px 50px">
        <svg width="150" height="40" viewBox="0 0 512 138">
          <path
            fill="#E50914"
            d="M0 0h100l60 138h-100zM140 0h80l60 138h-80zM300 0h80v138h-80zM420 0h92v138h-92z"
          />
        </svg>
      </div>

      <!-- Login Box -->
      <div
        style="
          flex: 1;
          display: flex;
          justify-content: center;
          align-items: center;
        "
      >
        <div
          style="
            width: 320px;
            background: rgba(0, 0, 0, 0.75);
            padding: 60px;
            color: white;
            border-radius: 4px;
          "
        >
          <h1 style="margin: 0 0 28px 0; font-size: 32px">Sign In</h1>

          <input
            type="text"
            placeholder="Email or phone number"
            style="
              width: 100%;
              padding: 14px;
              margin-bottom: 16px;
              background: #333;
              border: none;
              border-radius: 4px;
              color: white;
              font-size: 16px;
            "
          />

          <input
            type="password"
            placeholder="Password"
            style="
              width: 100%;
              padding: 14px;
              margin-bottom: 30px;
              background: #333;
              border: none;
              border-radius: 4px;
              color: white;
              font-size: 16px;
            "
          />

          <button
            style="
              width: 100%;
              padding: 14px;
              background: #e50914;
              border: none;
              border-radius: 4px;
              color: white;
              font-size: 16px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            Sign In
          </button>

          <!-- Remember me -->
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 12px;
              font-size: 13px;
              color: #b3b3b3;
            "
          >
            <label style="display: flex; align-items: center">
              <input type="checkbox" style="margin-right: 6px" />
              Remember me
            </label>

            <span style="cursor: pointer">Need help?</span>
          </div>

          <!-- Signup -->
          <div style="margin-top: 50px; color: #737373; font-size: 16px">
            New to Netflix?
            <span style="color: white; cursor: pointer"> Sign up now</span>
          </div>

          <div style="margin-top: 15px; font-size: 13px; color: #8c8c8c">
            This page is protected by Google reCAPTCHA to ensure you're not a
            bot.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
