<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolute Demo</title>

    <style>
      .box {
        margin: 20px;
        padding: 10px;
      }

      .item {
        width: 100px;
        height: 100px;
        border: 1px solid #888;
        padding: 10px;
        margin-bottom: 15px;
        position: relative;
      }

      .close-icon {
        position: absolute;
        right: 10px;
        top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="item">
        <div class="text">Hello World</div>
        <div class="close-icon">x</div>
      </div>

      </div>

</html>
