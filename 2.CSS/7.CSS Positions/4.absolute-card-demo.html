<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
      }
      h2 {
        margin: 0;
      }
      .box {
        width: 300px;
        padding: 12px;
        border: 1px solid #ccc;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .close {
        position: absolute;
        top: 10px;
        right: 10px;
        cursor: pointer;
        font-weight: bold;
        height: 20px;
        width: 20px;
        text-align: center;
        background-color: black;
        color: white;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="close">x</div>
      <div class="content">
        <h2>Card Title</h2>
        <p>This is a sample card with absolute positioned close button.</p>
      </div>
    </div>
  </body>
</html>
