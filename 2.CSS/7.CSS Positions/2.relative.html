<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relative Position</title>
    <style>
      .static-box {
        width: 100px;
        height: 100px;
        background-color: lightblue;
        margin: 10px;
      }
      .relative-box {
        width: 100px;
        height: 100px;
        background-color: lightcoral;
        margin: 10px;
        position: relative;
        left: 30px;
      }
    </style>
  </head>
  <body>
    <div class="static-box">A</div>
    <div class="relative-box">B</div>
    <div class="static-box">C</div>
  </body>
</html>
