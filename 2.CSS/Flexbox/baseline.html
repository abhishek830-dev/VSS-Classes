<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Align Items Baseline</title>
    <style>
      body {
        margin: 0;
      }
      .box {
        display: flex;
        background-color: lightgreen;
        padding: 12px;
        gap: 12px;
        height: 300px;
      }

      .item {
      }

      .item-one {
        font-size: 40px;
      }

      .item-two {
        font-size: 20px;
      }
      .item-three {
        font-size: 79px;
      }

      .ai-baseline {
        margin-top: 12px;
        align-items: baseline;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="box ai-baseline">
      <div class="item item-one">Item 1</div>
      <div class="item item-two">Item 2</div>
      <div class="item item-three">Item 3</div>

      <div class="item item-one">Item 1</div>
      <div class="item item-two">Item 2</div>

      <div class="item item-two">Item 2</div>
    </div>
  </body>
</html>
