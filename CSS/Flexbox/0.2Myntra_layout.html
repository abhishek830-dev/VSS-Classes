<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Layout</title>
    <style>
         body {
        margin: 0;
      }
      section {
        background-color: rgb(235, 118, 118);
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 12px;
      }

      section div {
        background-color: rgb(133, 239, 12);
        color: black;
        flex: 30%;
        border-radius: 12px;
        height: 150px;
        gap: 100px;
        align-items: center;
        /* justify-content: center; */
        display: flex;
      }
       section div:nth-child(odd) {
        background-color: rgb(203, 16, 216);
      }

      header {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        background-color: aqua;
        height: 60px;
        text-emphasis-color: black;
      }

      .header-nav1 {
        display:flex;
        gap: 20px;
        font-weight: bold;
        text-decoration: none;
      }
      .header-nav2 {
        display: flex;
        gap: 20px;
        font-weight: lighter;

      }
    </style>
</head>
<body>
    <header>
