<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <style>
      .box,
      .box2 {
        width: 250px;
        height: 150px;
        border: 1px solid red;
      }

      .box {
        padding: 12px;
        margin: 4px;
      }

      .box2 {
        margin: 10px;
        padding: 10px;
      }

      h1 {
        background-color: rgb(129, 89, 89);
      }

      .inner-box-1 {
        background-color: blue;
        color: white;
        padding: 20px;
        border: 2px solid greenyellow;
      }

      .inner-box-2 {
        background-color: rgb(227, 12, 105);
        color: white;
        padding: 20px;
        border: 2px solid rgba(66, 188, 86, 0.949);
      }
    </style>
  </head>
  <body>
    <div class="box">
      Box 1
      <div class="inner-box-1">InnerBox</div>
      <div class="inner-box-2">InnerBox</div>
    </div>
    <div class="box2">Box</div>
    <!-- <h1>Hello</h1>
    <h1>Hello</h1> -->
  </body>
</html>
