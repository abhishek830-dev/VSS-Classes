<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipkart Application</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        body {
            margin: 0;
            font-family: Lato, sans-serif;
            background: #f1f3f6;
        }

        /* ---------------- SLIDER ---------------- */
        .banner-container {
            max-width: 1380px;
            margin: 20px auto;
        }

        .slider {
            width: 100%;
            height: 260px;
            overflow: hidden;
            border-radius: 8px;
            background: #ddd;
        }

        .slides {
            display: flex;
            height: 100%;
            animation: slide 18s infinite;
        }

        .slides img {
            flex: 0 0 100%;
            /* 🔥 CRITICAL FIX */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 6 images → translateX in steps of 100% */
        @keyframes slide {
            0% {
                transform: translateX(0);
            }

            15% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-100%);
            }

            35% {
                transform: translateX(-100%);
            }

            40% {
                transform: translateX(-200%);
            }

            55% {
                transform: translateX(-200%);
            }

            60% {
                transform: translateX(-300%);
            }

            75% {
                transform: translateX(-300%);
            }

            80% {
                transform: translateX(-400%);
            }

            95% {
                transform: translateX(-400%);
            }

            100% {
                transform: translateX(0);
            }

            /* clean loop */
        }

        /* ---------------- PRODUCTS ---------------- */
        .box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .item {
            background: thistle;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <!-- SLIDER -->
    <section class="banner-container">
        <div class="slider">
            <div class="slides">
                <img src="https://rukminim1.flixcart.com/fk-p-flap/3240/540/image/affd2e30c895a095.jpg?q=60" />
                <img src="https://rukminim1.flixcart.com/fk-p-flap/3240/540/image/34376a8fd17ae79c.jpg?q=60" />
                <img src="https://rukminim1.flixcart.com/fk-p-flap/3240/540/image/949f9327aacd1795.jpg?q=60" />
                <img src="https://rukminim1.flixcart.com/fk-p-flap/3240/540/image/9e48bbeaa5a01f0d.jpg?q=60" />
                <img src="https://rukminim1.flixcart.com/fk-p-flap/3240/540/image/1f9c9ad24c2bc37b.jpg?q=60" />
                <img src="https://rukminim1.flixcart.com/fk-p-flap/3240/540/image/94794a73bd6c8798.png?q=60" />
            </div>
        </div>
    </section>

    <!-- PRODUCTS -->
    <div class="box">
        <div class="item">
            <img
                src="https://rukminim2.flixcart.com/image/612/612/xif0q/shirt/n/x/c/xl-met-shirt1408-metronaut-original-imahgrb99ffhkdyg.jpeg?q=70">
        </div>
        <div class="item">
            <img
                src="https://rukminim2.flixcart.com/image/612/612/xif0q/shirt/n/x/c/xl-met-shirt1408-metronaut-original-imahgrb99ffhkdyg.jpeg?q=70">
        </div>
        <div class="item">
            <img
                src="https://rukminim2.flixcart.com/image/612/612/xif0q/shirt/n/x/c/xl-met-shirt1408-metronaut-original-imahgrb99ffhkdyg.jpeg?q=70">
        </div>
    </div>

</body>

</html>
